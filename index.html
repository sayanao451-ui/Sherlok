<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherlok</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff; /* Set a background color */
            color: #333; /* Ensure text is visible */
        }
        .slideshow {
            position: relative;
            max-width: 100%;
            margin: auto;
        }
        .slideshow img {
            width: 100%;
            height: auto;
            display: none; /* Hide images initially */
        }
        .slideshow img.active {
            display: block; /* Show only the active image */
        }
        .caption {
            text-align: center;
            margin-top: 5px;
            font-size: 16px;
        }
    </style>
    <script>
        let currentIndex = 0;
        let images;
        function initSlideshow() {
            images = document.querySelectorAll('.slideshow img');
            images[currentIndex].classList.add('active');
            setInterval(nextSlide, 3000); // 3 seconds for each slide
        }
        function nextSlide() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }
        window.onload = initSlideshow;
    </script>
</head>
<body>
    <div class="slideshow">
        <img src="image1.jpg" alt="Caption 1">
        <div class="caption">Caption for image 1</div>
        <img src="image2.jpg" alt="Caption 2">
        <div class="caption">Caption for image 2</div>
        <img src="image3.jpg" alt="Caption 3">
        <div class="caption">Caption for image 3</div>
    </div>
</body>
</html>

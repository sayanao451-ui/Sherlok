<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow with Countdown</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
        }
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('background-video.mp4') no-repeat center center fixed;
            background-size: cover;
        }
        .mySlides {
            display: none;
        }
        .text {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 29px;
            color: black;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }
        .countdown {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        audio {
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="slideshow-container">

    <div class="mySlides">
        <img src="img1.jpg" style="width:100%">
        <div class="text">Caption 1</div>
    </div>

    <div class="mySlides">
        <img src="img2.jpg" style="width:100%">
        <div class="text">Caption 2</div>
    </div>

    <div class="mySlides">
        <img src="img3.jpg" style="width:100%">
        <div class="text">Caption 3</div>
    </div>

    <div class="countdown" id="countdown"></div>

    <audio autoplay loop>
        <source src="background-music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

<script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        slideIndex++;
        if (slideIndex > slides.length) {slideIndex = 1}    
        slides[slideIndex-1].style.display = "block";  
        setTimeout(showSlides, 5000); // Change image every 5 seconds
    }

    function updateCountdown() {
        const countDownDate = new Date("2026-05-02").getTime();
        const now = new Date().getTime();
        const distance = countDownDate - now;
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
        if (distance < 0) {

            document.getElementById("countdown").innerHTML = "Countdown finished!";
        }
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>

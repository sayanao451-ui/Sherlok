<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Index</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            animation: pulse 5s infinite;
            transition: background-color 0.5s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.8; }
        }

        .slideshow {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .slideshow img {
            width: 100%;
            height: auto;
            animation: fade 1.5s ease-in-out forwards;
        }

        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .countdown {
            font-size: 2em;
            text-align: center;
            color: #ff4500;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
            to { text-shadow: 0 0 20px rgba(255, 69, 0, 1); }
        }

        .scale {
            transition: transform 0.3s;
        }

        .scale:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img src="foto1.JPG" alt="Slide 1" class="scale">
        <img src="foto2.JPG" alt="Slide 2" class="scale" style="display:none;">
    </div>
    <div class="countdown" id="countdown-timer"></div>
    <audio controls>
        <source src="musik.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <script>
        // Countdown timer script
        function startCountdown(duration) {
            let timer = duration, minutes, seconds;
            setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                seconds = seconds < 10 ? "0" + seconds : seconds;
                document.getElementById('countdown-timer').textContent = minutes + ':' + seconds;
                if (--timer < 0) {
                    timer = duration;
                }
            }, 1000);
        }

        // Start countdown with a duration of 120 seconds
        startCountdown(120);

        // Slideshow logic
        let slides = document.querySelectorAll('.slideshow img');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].style.display = 'none';
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].style.display = 'block';
            slides[currentSlide].classList.add('scale');
        }, 3000);
    </script>
    <video width="320" height="240" controls>
        <source src="Bg.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>
</html>
